<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Card</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="weather-card">

    <!-- Top Section -->
    <div class="top">
        <div class="location">KOLKATA, WEST BENGAL, INDIA</div>
        <div class="temp" id="currentTemp">81°</div>

        <div class="condition">
            <h3 id="conditionText">Cloudy</h3>
            <p>Weather data </p>
        </div>
    </div>

    <!-- Bottom Section -->
    <div class="bottom" id="forecast"></div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
